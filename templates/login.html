<!DOCTYPE html>
<html lang="pt-BR" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Resolvendo Minha Vida</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <i class="bi bi-rocket-takeoff-fill"></i>
                </div>
                <h2>Resolvendo <span class="text-accent">Minha Vida</span></h2>
                <p class="text-muted">Seu quartel-general pessoal</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            {% for category, message in messages %}
            <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}
            {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('login') }}">
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-envelope me-1"></i> Email</label>
                    <input type="email" name="email" class="form-control form-control-lg" placeholder="seu@email.com" required>
                </div>
                <div class="mb-4">
                    <label class="form-label"><i class="bi bi-lock me-1"></i> Senha</label>
                    <input type="password" name="senha" class="form-control form-control-lg" placeholder="Sua senha" required>
                </div>
                <button type="submit" class="btn btn-accent btn-lg w-100 mb-3">
                    <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
                </button>
            </form>

            <div class="text-center mt-3">
                <a href="{{ url_for('registro') }}" class="text-accent">Criar nova conta</a>
            </div>

            <div class="login-demo mt-4">
                <small class="text-muted">
                    <i class="bi bi-info-circle me-1"></i>
                    Conta padrao: <strong>admin@vida.com</strong> / <strong>admin123</strong>
                </small>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
